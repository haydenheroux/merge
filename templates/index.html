<!DOCTYPE html>
<html>
<head>
	<title>Merge Zone</title>
    <link rel="stylesheet" href="/public/main.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <meta name="description" content="Understand your team's review workflow, collaboration, and delivery."/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Merge Zone"/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="{{.BaseURL}}"/>
    <meta property="og:description" content="Understand your team's review workflow, collaboration, and delivery."/>
</head>
<body>
    <header class="hero">
        <div>
            <h1 class="title">Merge Zone</h1>
            <p class="dim">Understand your team's review workflow, collaboration, and delivery.</p>
        </div>
    </header>
    <main>
        <form id="repo-form" class="dim center-inline">
            <div class="input-group">
                <i class="bi bi-github"></i>
                <input 
                    type="text" 
                    id="repo-input" 
                    placeholder="owner/repo"
                    required
                >
                <button type="submit">
                    <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </form>
        <div class="example center-inline very-dim">
                <h2>www.<em>github.com</em>/owner/repo</h2>
                <i class="bi bi-arrow-down-short text arrow"></i>
                <h2>www.<em>merge.zone</em>/owner/repo</h2>
        </div>
    </main>

    <script>
        document.getElementById('repo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('repo-input').value.trim();
            
            var repo = input
                .replace(/^https?:\/\/github\.com\//, '')
                .replace(/\/$/, '');
            
            if (repo) {
                window.location.href = '/' + repo;
            }
        });
    </script>
    <footer class="center-inline">
        <p class="very-dim">
            By <a class="text" href="https://www.haydenheroux.com">Hayden Heroux</a>
            &nbsp;&middot;&nbsp;
            View on <a class="text" href="https://www.github.com/haydenheroux/merge">GitHub</a>
            &nbsp;&middot;&nbsp;
            View on <a class="text" href="https://www.merge.zone/haydenheroux/merge">Merge Zone</a>
        </p>
    </footer>
</body>
</html>
