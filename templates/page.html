<!DOCTYPE html>
<html>
<head>
	<title>{{.Owner}}/{{.Repo}}</title>
    <link rel="stylesheet" href="/public/main.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="title">{{.Owner}}/{{.Repo}}</h1>
		<div class="bar">
			<p class="dim"><b>{{.OpenCount}}</b> open pull requests</p>
			<p class="dim"><b>{{ .StaleCount }}</b> stale pull requests</p>
			<p class="dim"><b>{{ .ExpiredCount }}</b> expired pull requests</p>
		</div>
    </header>
    <main>
        {{range .PRs}}
        <div class="pull-request{{if .IsDraft}} draft{{end}}">
            <div class="center">
				<i class="bi {{if .IsExpired}}bi-x-circle error{{else}}{{if .IsStale}}bi-exclamation-triangle warn{{else}}bi-check-circle ok{{end}}{{end}}"></i>
            </div>
            <div class="center-block">
				<b class="title">{{if .IsDraft}}Draft{{else}}Open{{end}}</b>
                <span class="dim">{{.DaysOpen}} days</span>
            </div>
            <div>
				<span>
					<a href="{{.URL}}"><b class="title">{{.Title}}</b></a>
						<span class="dim"><a href="{{.URL}}"> &nbsp;&middot;&nbsp; #{{.Number}}</a> &nbsp;&middot;&nbsp; <a href="{{.Author.URL}}">{{.Author.Name}}</a></span>
				</span>
                <span class="dim">{{.Body}}</span>
            </div>
        </div>
        {{end}}
    </main>
</body>
</html>
